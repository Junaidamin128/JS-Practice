<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="box m-auto">
            <h1>Todo List</h1>
            <div class="input ">
                <input type="text" id="task" placeholder="Enter The Task">
                <button id="btn" class="btn"  onclick="myFunction()">Enter</button>
            </div>
            <div class="output">
                <ul id="list">
                </ul>
            </div>
        </div>
    </div>
    <script>
        let int = document.getElementById("task");
        let output = document.getElementById("list");
        
        function myFunction(){
            let input = int.value;
            let li = document.createElement("li")
            li.innerHTML = input +'<input type="checkbox" id="cb">';
            output.appendChild(li);
            
            let cb = document.getElementById("cb")
            cb.addEventListener('change',(evt)=>{
                if(evt.currentTarget.checked){
                    console.log("Hello")
                    li.remove();
                }
            })
        }
    </script>
</body>
</html>
