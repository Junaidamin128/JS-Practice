<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
  </head>
  <body>
    <div class="container flex h-screen bg-grey-100">
      <div
        class="notebooks bg-gray-800 notebooks p-3 text-2xl text-white w-3/12"
      >
        <h1 class="font-bold text-3xl m-2">
          Notebooks
          <button
            class="bg-blue-400 p-2 rounded hover:bg-blue-600 font-bold"
            id="btnNotebookForm"
          >
            +
          </button>
        </h1>

        <ul class="mt-5 mb-5 p-3" id="notebookTree"></ul>
        <form class="hidden" id="notebookForm">
          <input
            type="text"
            name="notebook"
            id="notebook"
            class="text-black p-1"
          />
          <button
            class="bg-blue-400 p-2 rounded m-2 hover:bg-blue-600"
            id="btnAddNotebook"
          >
            Add
          </button>
        </form>
      </div>
      <div class="notes bg-gray-300 notebooks p-3 text-2xl text-black w-3/12">
        <h1 class="font-bold text-3xl m-2">
          Notes
          <button
            class="bg-blue-400 p-2 rounded hover:bg-blue-600 font-bold"
            id="btnNoteForm"
          >
            +
          </button>
        </h1>

        <ul class="mt-5 mb-5 p-3" id="noteTree"></ul>
      </div>
      <div class="content m-4 w-6/12">
        <div class="preview" id="preview">
          
        </div>
        <div class="newNoteForm hidden" id="noteForm">
          <input
            type="text"
            name="title"
            id="title"
            placeholder="Title"
            class="text-6xl border-2 p-2 rounded"
          />
          <textarea
            name="message"
            id="discription"
            placeholder="Discription"
            class="w-10/12 p-4 text-2xl"
          ></textarea>
          <button class="text-2xl p-2 rounded border-4 border-black hover:bg-black hover:text-white " id="btnAddNote">Save</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
