<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
    />
    <title>Notes</title>
  </head>
  <body>
    <div class="container flex h-screen">
      <div class="folder w-3/12 bg-gray-900 text-white text-2xl" id="folder">
        <h3>NoteBook</h3>
        <button
          class="btn-folder bg-white text-black border-2 p-1"
          id="addFolder"
        >
          +
        </button>
        <ul id="notebook-items">
          <!-- <li><a class="notebook-item" data-id="1">JS</a></li> -->
          <!-- <li><a class="notebook-item" data-id="2">HTML</a></li> -->
          <!-- <li><a class="notebook-item" data-id="3">CSS</a></li> -->
        </ul>
        <form class="shidden" id="notebook-form">
          <input class="text-black" id="notebook-form-name" />
          <button id="addFolderName">Add</button>
        </form>
      </div>
      <div class="files w-3/12 text-2xl bg-gray-600" id="files">
        <button
          class="m-5 border-gray-500 text-black border-2 p-1"
          id="btnAddNote"
        >
          Add
        </button>
        <ul id="note-items">
          <!-- <li><a class="note-item" data-id="1">JS</a></li> -->
          <!-- <li><a class="note-item" data-id="2">HTML</a></li> -->
          <!-- <li><a class="note-item" data-id="3">CSS</a></li> -->
        </ul>
      </div>
      <div class="w-6/12" id="preview-section">
        <div id="preview"></div>
        <div id="note-form">
          <form>
            <input
              type="text"
              id="title"
              placeholder="Title"
              class="text-2x-1"
            />
            <input
              type="text"
              name="discription"
              id="dis"
              placeholder="Discription"
            />
            <button id="note-save">save</button>
          </form>
        </div>
      </div>
    </div>

    <h1 class="text-3xl font-bold underline">Hello world!</h1>

    <script src="script.js"></script>
  </body>
</html>
