<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>

<body>

    <div class="flex h-screen w-screen bg-gray-100">
        <div class="notebooks bg-gray-900 text-white w-2/12 p-2">
            <h1 class="text-3xl">NOTEBOOKS <button
                class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                id="btn-add-notebook">+</button></h1>
            
            <ul id="notebooks-tree" class="mt-5">
                <li class="p-4 "> <a class="cursor-pointer nodebook-item">Notebook1</a> <i
                        class="cursor-pointer border-2 p-1 ml-1">Edit</i> </li>
            </ul>
        </div>
        <div class="notes bg-gray-600 w-2/12 text-white p-2">
            <h2 class="text-2xl">Notes 
            <button
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
            id="btn-add-notebook">+</button>
            </h2>
        <ul id="notebooks-tree" class="mt-5">
            <ul id="notes-tree">
                <li class="p-4"> <a href="" class="note-item">Note1</a> <i class="border-2 p-1 ml-1">Edit</i> </li>
            </ul>
        </div>
        <div class="content bg-gray-100 w-8/12 p-2">
            <div id="note-preview" class="h-full bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4"></div>
            <div id="note-add-form" class="w-full hidden">
                <form class=" bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
                            Title
                        </label>
                        <input
                            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
                            id="username" type="text" placeholder="Username">
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
                            Body
                        </label>
                        <textarea rows="30"
                            class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline"
                            id="password" placeholder="Note body."></textarea>
                    </div>
                    <div class="flex items-center justify-between">
                        <button
                            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
                            type="button">
                            Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
